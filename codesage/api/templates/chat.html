<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSage Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            margin-top: 5px;
        }

        .chat-area {
            height: 450px;
            overflow-y: auto;
            padding: 20px 30px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.agent {
            align-items: flex-start;
        }

        .message-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .debug-panel {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px 30px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .debug-header h3 {
            color: #9cdcfe;
            font-size: 14px;
        }

        .debug-toggle {
            background: #333;
            color: #ccc;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .debug-content {
            display: none;
        }

        .debug-content.show {
            display: block;
        }

        .debug-section {
            margin-bottom: 15px;
        }

        .debug-label {
            color: #569cd6;
            margin-bottom: 5px;
        }

        .debug-json {
            background: #2d2d2d;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status-bar {
            padding: 10px 30px;
            background: #f0f0f0;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .suggestions {
            padding: 10px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .suggestion {
            background: white;
            border: 1px solid #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion:hover {
            border-color: #667eea;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CodeSage Chat</h1>
            <p>与 AI 代码助手对话 - 支持代码审查、知识问答、代码修改</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message agent">
                <span class="message-label">CodeSage</span>
                <div class="message-content">你好！我是 CodeSage，一个智能代码助手。

我可以帮助你：
🔍 代码审查 - 发送 GitHub PR 链接或代码片段
📚 代码问答 - 询问代码相关问题（如"什么是 httpx？"）
✏️ 代码修改 - 让你帮我添加、修改代码

请告诉我你需要什么帮助？</div>
            </div>
        </div>

        <div class="suggestions">
            <span class="suggestion" onclick="sendMessage('什么是 httpx？')">什么是 httpx？</span>
            <span class="suggestion" onclick="sendMessage('如何用 Python 发送 HTTP 请求？')">如何用 Python 发送 HTTP 请求？</span>
            <span class="suggestion" onclick="sendMessage('帮我添加一个函数')">帮我添加一个函数</span>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的问题或请求..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>

        <div class="debug-panel">
            <div class="debug-header">
                <h3>调试信息</h3>
                <button class="debug-toggle" onclick="toggleDebug()">显示/隐藏</button>
            </div>
            <div class="debug-content" id="debugContent">
                <div class="debug-section">
                    <div class="debug-label">Thread ID:</div>
                    <div class="debug-json" id="threadIdDisplay">-</div>
                </div>
                <div class="debug-section">
                    <div class="debug-label">Request:</div>
                    <div class="debug-json" id="requestDisplay">-</div>
                </div>
                <div class="debug-section">
                    <div class="debug-label">Response:</div>
                    <div class="debug-json" id="responseDisplay">-</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">就绪</span>
            <button class="clear-btn" onclick="clearChat()">清空对话</button>
        </div>
    </div>

    <script>
        let threadId = '';
        let isLoading = false;

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage(customMessage) {
            const userInput = document.getElementById('userInput');
            const message = customMessage || userInput.value.trim();

            if (!message || isLoading) return;

            // 添加用户消息
            addMessage('user', message);
            userInput.value = '';

            // 显示加载状态
            setLoading(true);

            // 更新调试信息
            const requestData = {
                message: message,
                thread_id: threadId || ''
            };
            document.getElementById('requestDisplay').textContent = JSON.stringify(requestData, null, 2);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let finalContent = '';
                let finalThreadId = threadId;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                // 解析 SSE 事件，消息流里可能一次带多个 event，以 `\n\n` 分隔。
                    const events = buffer.split('\n\n');
                buffer = events.pop() || ''; // 保留最后一个不完整事件。

                    for (const eventBlock of events) {
                        const lines = eventBlock.split('\n');
                        let eventType = '';
                        let eventData = '';

                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                eventType = line.slice(6).trim();
                            } else if (line.startsWith('data:')) {
                                eventData = line.slice(5).trim();
                            }
                        }

                        if (!eventData) continue;

                        try {
                            const data = JSON.parse(eventData);

                            if (eventType === 'step') {
                                // 进度步骤：显示当前步骤
                                addMessage('agent', `[${data.step}] ${data.message}`);
                            } else if (eventType === 'message') {
                                // 中间消息：追加到最终内容
                                finalContent = data.content;
                            } else if (eventType === 'done') {
                                // 最终结果
                                if (data.thread_id && !finalThreadId) {
                                    finalThreadId = data.thread_id;
                                    threadId = finalThreadId;
                                    document.getElementById('threadIdDisplay').textContent = threadId;
                                }
                                if (data.content) {
                                    finalContent = data.content;
                                }
                            } else if (eventType === 'error') {
                                addMessage('agent', `错误: ${data.content}`);
                                setLoading(false);
                                return;
                            }
                        } catch (e) {
                            console.warn('Failed to parse SSE data:', e);
                        }
                    }
                }

                    // 添加最终 Agent 消息。
                if (finalContent) {
                    addMessage('agent', finalContent);
                } else {
                    addMessage('agent', '抱歉，处理失败，请重试。');
                }

                // 更新调试信息
                document.getElementById('responseDisplay').textContent = JSON.stringify({ content: finalContent, thread_id: finalThreadId }, null, 2);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('responseDisplay').textContent = 'Error: ' + error.message;
                addMessage('agent', '请求失败: ' + error.message);
            }

            setLoading(false);
        }

        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const label = role === 'user' ? '你' : 'CodeSage';
            messageDiv.innerHTML = `
                <span class="message-label">${label}</span>
                <div class="message-content">${escapeHtml(content)}</div>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setLoading(loading) {
            isLoading = loading;
            const sendBtn = document.getElementById('sendBtn');
            const userInput = document.getElementById('userInput');
            const statusText = document.getElementById('statusText');

            if (loading) {
                sendBtn.disabled = true;
                sendBtn.innerHTML = '<span class="loading"></span>处理中...';
                userInput.disabled = true;
                statusText.textContent = 'AI 正在思考...';
            } else {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
                userInput.disabled = false;
                userInput.focus();
                statusText.textContent = '就绪';
            }
        }

        function toggleDebug() {
            const debugContent = document.getElementById('debugContent');
            debugContent.classList.toggle('show');
        }

        function clearChat() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="message agent">
                    <span class="message-label">CodeSage</span>
                    <div class="message-content">对话已清空。请问有什么可以帮助你的？</div>
                </div>
            `;
            threadId = '';
            document.getElementById('threadIdDisplay').textContent = '-';
            document.getElementById('requestDisplay').textContent = '-';
            document.getElementById('responseDisplay').textContent = '-';
        }
    </script>
</body>
</html>
